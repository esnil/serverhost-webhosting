name: status-ci

on:
  push:
    branches: [main]
    paths:
      - apps/status/**
  pull_request:
    paths:
      - apps/status/**

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/status/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/status

      - name: Lint
        run: npm run lint
        working-directory: apps/status

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build apps/status \
            -t ghcr.io/${{ github.repository }}/status:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/status:main

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository }}/status:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/status:main
