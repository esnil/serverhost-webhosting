<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hello.vps.encab.se</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #161616;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-bottom: 2rem;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.85rem;
      color: #555;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1>hello.vps.encab.se</h1>
    <p>VPS · Docker · Traefik · Let's Encrypt</p>
  </div>
</body>
</html>
