# JLSK Fishing — Öppen-driftfallet (ingen WordPress).
# EN container, single-origin: samma image servar deltagarappen på / och admin på
# /admin/ (skalval path-baserat i public-standalone/app.php — ingen JF_APP, ingen
# admin-subdomän). SQLite + uploads via bind mounts under /opt/hosting/apps/fishing/data/.
#
# Imagen byggs och laddas lokalt (docker save | ssh docker load) av deploy.sh —
# den hämtas alltså INTE från ett register. IMAGE_TAG styr vilken laddad tagg som körs.

services:
  fishing:
    image: jlsk-fishing:${IMAGE_TAG:-latest}
    container_name: fishing
    restart: unless-stopped
    environment:
      JF_DB_DSN: "sqlite:/data/db/jlsk_fishing.sqlite"
      JF_DB_PREFIX: jf_
      JF_UPLOAD_DIR: /data/uploads
      JF_UPLOAD_URL: /uploads
      JF_BRAND_PROFILE: jlsk
      # Appens publika origin. Sätts EXPLICIT därför att magiska inloggningslänkar byggs av
      # den: härleds den ur requesten blir schemat fel bakom Traefik (TLS termineras där, så
      # containern ser vanlig HTTP) och värdnamnet blir klientstyrt via Host-headern.
      JF_APP_URL: "https://fiske.ostersundarn.se/"
      # Utgående e-post: magiska inloggningslänkar + adminnotis vid ny feedback.
      # Värdena interpoleras ur .env BREDVID denna fil PÅ SERVERN
      # (/opt/hosting/apps/fishing/.env) — den är gitignorerad och bär SMTP-lösenordet.
      # Saknas JF_SMTP_HOST faller appen tillbaka på NullMailer och skickar TYST ingenting.
      JF_SMTP_HOST: "${JF_SMTP_HOST:-}"
      JF_SMTP_PORT: "${JF_SMTP_PORT:-587}"
      JF_SMTP_ENCRYPTION: "${JF_SMTP_ENCRYPTION:-tls}"
      JF_SMTP_USER: "${JF_SMTP_USER:-}"
      JF_SMTP_PASS: "${JF_SMTP_PASS:-}"
      JF_MAIL_FROM: "${JF_MAIL_FROM:-}"
      JF_MAIL_FROM_NAME: "${JF_MAIL_FROM_NAME:-}"
      JF_MAIL_REPLY_TO: "${JF_MAIL_REPLY_TO:-}"
      JF_MAIL_TO: "${JF_MAIL_TO:-}"
    volumes:
      - /opt/hosting/apps/fishing/data/db:/data/db
      - /opt/hosting/apps/fishing/data/uploads:/data/uploads
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fishing.rule=Host(`fiske.ostersundarn.se`)"
      - "traefik.http.routers.fishing.entrypoints=websecure"
      - "traefik.http.routers.fishing.tls.certresolver=letsencrypt"
      - "traefik.http.services.fishing.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
